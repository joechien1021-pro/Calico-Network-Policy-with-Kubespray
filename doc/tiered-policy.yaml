# ╚═══════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────
# NAMESPACE: historian
# ─────────────────────────────────────────────────────────────

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: historian-default-deny
  namespace: historian
  annotations:
    owner: app-team-historian
    ticket: APP-001
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: historian-allow-internal
  namespace: historian
  annotations:
    owner: app-team-historian
    ticket: APP-002
    description: "historian pods communicate internally"
spec:
  podSelector: {}
  ingress:
  - from:
    - podSelector: {}              # all pods within historian namespace
  egress:
  - to:
    - podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: historian-allow-insight
  namespace: historian
  annotations:
    owner: app-team-historian
    ticket: APP-003
    description: "insight namespace can query historian data"
spec:
  podSelector:
    matchLabels:
      app: historian-api
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: insight
      podSelector:
        matchLabels:
          role: data-consumer
  policyTypes:
  - Ingress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: historian-allow-dns-egress
  namespace: historian
  annotations:
    owner: app-team-historian
    ticket: APP-004
spec:
  podSelector: {}
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  policyTypes:
  - Egress

