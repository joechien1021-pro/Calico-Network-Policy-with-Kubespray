---

### Architecture Summary
```
TIER 1 · Security (order 1-199)
  sec-protect-control-plane     → API server + etcd lockdown
  sec-ssh-lockdown              → jump host only
  sec-protect-domain-controllers→ AD/LDAP restricted
  sec-block-bmc-ipmi            → management network blocked
  sec-log-denied-traffic        → SIEM feed

TIER 2 · Platform (order 200-499)
  platform-allow-corporate-ingress   → LAN only
  platform-internal-dns-only         → corp DNS enforced
  platform-force-proxy-egress        → no direct internet
  platform-protect-storage           → storage VLAN locked
  platform-kube-system               → system namespace
  platform-ingress-nginx             → HTTP/S from LAN only
  platform-keycloak                  → auth from approved NS
  platform-dashboard                 → admin subnet only
  platform-headlamp                  → admin subnet only
  platform-app-namespaces-baseline   → ingress + monitoring
  platform-pass-to-app-teams         → Pass → K8s NP

TIER 4 · Catch-All (order 9999)
  default-deny-all              → deny everything else

TIER 5 · App Teams (K8s NetworkPolicy)
  historian  → internal + insight query
  insight    → internal + historian egress + gpu submit
  gpu-operator → internal + kube-system + insight consumers
