        selector: all()
  egress:
    - action: Allow
      destination:
        namespaceSelector: kubernetes.io/metadata.name == 'ns-beta'
        selector: all()
---
apiVersion: crd.projectcalico.org/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-namespace
  namespace: ns-gamma
spec:
  selector: all()
  order: 210
  types:
    - Ingress
    - Egress
  ingress:
    - action: Allow
      source:
        namespaceSelector: kubernetes.io/metadata.name == 'ns-gamma'
