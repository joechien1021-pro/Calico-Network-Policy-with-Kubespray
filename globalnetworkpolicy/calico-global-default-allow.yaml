#################################################
# Calico Global Network Policy - Allow All
# This policy allows all ingress and egress traffic
# across the entire cluster.
# File: calico-global-default-allow.yaml
#################################################

apiVersion: crd.projectcalico.org/v1 # Calico CRD API version available in this cluster.
kind: GlobalNetworkPolicy # Resource type for cluster-wide Calico policy - not just one namespace.
metadata:
  name: global-default-allow
spec:
  selector: all()
  types:
    - Ingress
    - Egress
  ingress:
    - action: Allow
  egress:
    - action: Allow

  # calicoctl apply -f calico-global-default-allow.yaml